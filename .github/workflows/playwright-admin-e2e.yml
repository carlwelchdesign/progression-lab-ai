name: Playwright Admin E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'admin-dashboard/**'
      - '.github/workflows/playwright-admin-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'admin-dashboard/**'
      - '.github/workflows/playwright-admin-e2e.yml'

permissions:
  contents: read
  packages: read

jobs:
  admin-e2e:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    name: Admin E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' && secrets.NPM_TOKEN || github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN != '' && secrets.NPM_TOKEN || github.token }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - chromium-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure npm auth for GitHub Packages
        shell: bash
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"

      - name: Debug token availability
        shell: bash
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "Using repository NPM_TOKEN secret"
          else
            echo "NPM_TOKEN secret not available; using github.token fallback"
          fi
          npm whoami --registry=https://npm.pkg.github.com || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run admin Playwright tests
        run: npx playwright test -c admin-dashboard/playwright.config.ts --project=${{ matrix.project }}

      - name: Upload admin Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report-${{ matrix.project }}
          path: |
            admin-dashboard/playwright-report/
            admin-dashboard/test-results/
          if-no-files-found: ignore
