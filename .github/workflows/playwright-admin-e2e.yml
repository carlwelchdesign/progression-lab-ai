name: Playwright Admin E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'admin-dashboard/**'
      - '.github/workflows/playwright-admin-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'admin-dashboard/**'
      - '.github/workflows/playwright-admin-e2e.yml'

permissions:
  contents: read
  packages: read

jobs:
  admin-e2e:
    name: Admin E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - chromium-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure npm auth for GitHub Packages
        shell: bash
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          TOKEN="$GH_PACKAGES_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$GITHUB_TOKEN_FALLBACK"
          fi
          echo "//npm.pkg.github.com/:_authToken=${TOKEN}" > "$HOME/.npmrc"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run admin Playwright tests
        run: npx playwright test -c admin-dashboard/playwright.config.ts --project=${{ matrix.project }}

      - name: Upload admin Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report-${{ matrix.project }}
          path: |
            admin-dashboard/playwright-report/
            admin-dashboard/test-results/
          if-no-files-found: ignore
